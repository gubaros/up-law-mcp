name: check

# Corre `make check` en cada push y pull request.
# Verde = toda afirmación tiene una fuente declarada. NO certifica corrección jurídica.

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: make install

      - name: Correr el check (lint + fuentes + tests)
        run: make check
